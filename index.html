<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>ImageNex</h1>

    <form action="">
      <input type="text" id="serch_input" placeholder="search for images" />
      <button id="serch_btn">Search</button>
    </form>

    <div class="search_results">
      <div class="search_result">
        <img
          src="https://plus.unsplash.com/premium_photo-1771709407348-7ed6b88bf18f?q=80&w=899&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="cute girl"
        />

        <a
          href="https://unsplash.com/photos/a-young-girl-playing-with-purple-and-green-streamers-49jcKa4P8jA"
          target="_blank"
          >Cute Girl</a
        >
      </div>

      <div class="search_result">
        <img
          src="https://images.unsplash.com/photo-1761839262867-af53d08b0eb5?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDF8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="friends"
        />

        <a
          href="https://unsplash.com/photos/four-friends-climbing-over-a-wooden-fence-outdoors-PCITNW3g85Q"
          target="_blank"
          >Friends</a
        >
      </div>

      <div class="search_result">
        <img
          src="https://images.unsplash.com/photo-1772306105241-fc51849ab40d?q=80&w=871&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          alt="calm"
        />

        <a
          href="https://unsplash.com/photos/woman-in-coat-standing-by-the-ocean-gqjSLEi4_Bo"
          target="_blank"
          >Calm</a
        >
      </div>
    </div>

    <button id="search_more_btn">Load More</button>

    <script src="script.js"></script>
  </body>
</html>
